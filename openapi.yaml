openapi: 3.0.3
info:
  title: IAM — Identity & Access Management API
  description: |
    Auth + User microservices with granular RBAC, behind a REST→gRPC gateway.

    **How to try it:**
    1. `POST /auth/login` with the demo admin (`admin@iam.local` / the demo
       password) and copy `access_token`.
    2. Click **Authorize** (top right) and paste the token.
    3. Call any protected endpoint below.

    The same API is served by both the Go and the Rust stack.
  version: "0.6.0"
  license:
    name: MIT
servers:
  - url: /
    description: This gateway
tags:
  - name: Auth
    description: Registration, login, tokens, recovery
  - name: Identity & Users
    description: Your identity and user profiles
  - name: RBAC
    description: Roles and permissions
  - name: Audit
    description: Audit log
  - name: 2FA
    description: Two-factor auth (TOTP) — enroll, activate, disable, login challenge
  - name: API Keys
    description: Scoped programmatic credentials (iamk_…)
  - name: OIDC
    description: OpenID Connect / OAuth2 provider (discovery, JWKS, authorize, token, userinfo)
  - name: Health
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error: { type: string, example: "permission denied: user:read" }
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: alice@iam.local }
        password: { type: string, format: password, minLength: 8, example: alicepass123 }
    RegisterResponse:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer, example: 900 }
        token_type: { type: string, example: Bearer }
        mfa_required: { type: boolean, description: "When true, 2FA is on: tokens are empty; complete login at /auth/login/totp" }
        mfa_token: { type: string, description: "Short-lived token to pass to /auth/login/totp" }
    ApiKey:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        scopes: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
    Identity:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        roles: { type: array, items: { type: string }, example: ["user"] }
        permissions: { type: array, items: { type: string }, example: ["profile:read", "profile:write"] }
    Profile:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        bio: { type: string }
        avatar_url: { type: string }
        phone: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProfileUpdate:
      type: object
      properties:
        display_name: { type: string }
        bio: { type: string }
        avatar_url: { type: string }
        phone: { type: string }
    Role:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        permissions: { type: array, items: { type: string } }
    Permission:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
    Success:
      type: object
      properties:
        success: { type: boolean, example: true }
    DevToken:
      type: object
      properties:
        success: { type: boolean }
        dev_token: { type: string, description: "Returned only in non-production, to ease testing." }
  responses:
    Unauthorized:
      description: Missing/invalid/expired token or bad credentials
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Authenticated but missing the required permission
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { status: { type: string, example: ok } } } } } }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (public)
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Credentials' } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/RegisterResponse' } } } }
        "400": { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        "409": { description: Email already registered, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in, get an access + refresh token (public)
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Credentials' } } }
      responses:
        "200": { description: "OK — tokens, or mfa_required + mfa_token when 2FA is on", content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/login/totp:
    post:
      tags: [2FA]
      summary: Complete a 2FA login with a TOTP or recovery code (public)
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [mfa_token, code], properties: { mfa_token: { type: string }, code: { type: string } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/2fa/enroll:
    post:
      tags: [2FA]
      summary: Begin TOTP enrollment — returns a secret, otpauth URI, and recovery codes
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { secret: { type: string }, otpauth_uri: { type: string }, recovery_codes: { type: array, items: { type: string } } } } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/2fa/activate:
    post:
      tags: [2FA]
      summary: Activate 2FA after verifying a TOTP code
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [code], properties: { code: { type: string } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/2fa/disable:
    post:
      tags: [2FA]
      summary: Disable 2FA after verifying a TOTP or recovery code
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [code], properties: { code: { type: string } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /api-keys:
    get:
      tags: [API Keys]
      summary: List your active API keys (metadata only)
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { keys: { type: array, items: { $ref: '#/components/schemas/ApiKey' } } } } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [API Keys]
      summary: Create a scoped API key (scopes must be a subset of your permissions). Secret shown once.
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string }, scopes: { type: array, items: { type: string } }, ttl_seconds: { type: integer, format: int64 } } } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { type: object, properties: { secret: { type: string }, key: { $ref: '#/components/schemas/ApiKey' } } } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /api-keys/{id}:
    parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
    delete:
      tags: [API Keys]
      summary: Revoke one of your API keys
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate a refresh token for a new pair (public)
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [refresh_token], properties: { refresh_token: { type: string } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the refresh token and denylist the access token
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [refresh_token], properties: { refresh_token: { type: string } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/verify-email/request:
    post:
      tags: [Auth]
      summary: Request an email-verification token (public)
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email], properties: { email: { type: string, format: email } } } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DevToken' } } } } }
  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify an email with a token (public)
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [token], properties: { token: { type: string } } } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }, "400": { description: Invalid/expired, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } } }
  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password-reset token (public)
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email], properties: { email: { type: string, format: email } } } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DevToken' } } } } }
  /auth/password-reset:
    post:
      tags: [Auth]
      summary: Reset a password with a token (public)
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [token, new_password], properties: { token: { type: string }, new_password: { type: string, format: password, minLength: 8 } } } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }, "400": { description: Invalid/expired, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } } }

  /me:
    get:
      tags: [Identity & Users]
      summary: Your identity, roles and permissions
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Identity' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /users/me:
    get:
      tags: [Identity & Users]
      summary: Your own profile (lazily created if missing)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Profile' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /users:
    get:
      tags: [Identity & Users]
      summary: List/search profiles (permission user:read)
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 20, maximum: 100 } }
        - { name: query, in: query, schema: { type: string }, description: search display_name }
        - { name: deleted, in: query, schema: { type: boolean }, description: "list soft-deleted users instead (for restore)" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles: { type: array, items: { $ref: '#/components/schemas/Profile' } }
                  total: { type: integer }
                  page: { type: integer }
                  page_size: { type: integer }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /users/{id}:
    parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
    get:
      tags: [Identity & Users]
      summary: Get a user profile (permission user:read)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Profile' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Identity & Users]
      summary: Update a profile (own = profile:write; others = user:write)
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProfileUpdate' } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Profile' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Identity & Users]
      summary: Delete a user — soft by default, ?hard=true for permanent (permission user:delete)
      parameters: [ { name: hard, in: query, required: false, schema: { type: boolean }, description: "Permanently remove instead of soft-deleting" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /users/{id}/restore:
    parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
    post:
      tags: [Identity & Users]
      summary: Restore a soft-deleted user (permission user:delete)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /roles:
    get:
      tags: [RBAC]
      summary: List roles (permission role:read)
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { roles: { type: array, items: { $ref: '#/components/schemas/Role' } } } } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [RBAC]
      summary: Create a role (permission role:write)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string }, description: { type: string } } } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: Already exists, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /roles/{name}:
    parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
    patch:
      tags: [RBAC]
      summary: Update a role description (permission role:write)
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { description: { type: string } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [RBAC]
      summary: Delete a role (permission role:write; built-ins protected)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: Built-in role, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /roles/{name}/permissions:
    parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
    post:
      tags: [RBAC]
      summary: Grant a permission to a role (permission role:write)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [permission], properties: { permission: { type: string } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
  /roles/{name}/permissions/{perm}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
      - { name: perm, in: path, required: true, schema: { type: string } }
    delete:
      tags: [RBAC]
      summary: Revoke a permission from a role (permission role:write)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
  /permissions:
    get:
      tags: [RBAC]
      summary: List all permissions (permission role:read)
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { permissions: { type: array, items: { $ref: '#/components/schemas/Permission' } } } } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
  /users/{id}/roles:
    parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
    post:
      tags: [RBAC]
      summary: Assign a role to a user (permission role:assign)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [role], properties: { role: { type: string } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /roles/{name}/assignments:
    parameters: [ { name: name, in: path, required: true, schema: { type: string } } ]
    post:
      tags: [RBAC]
      summary: Assign this role to many users at once (permission role:assign)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [user_ids], properties: { user_ids: { type: array, items: { type: string, format: uuid } } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { assigned: { type: integer }, failed: { type: array, items: { type: string } } } } } } }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /users/{id}/roles/{role}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: role, in: path, required: true, schema: { type: string } }
    delete:
      tags: [RBAC]
      summary: Revoke a role from a user (permission role:assign)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        "403": { $ref: '#/components/responses/Forbidden' }

  /audit:
    get:
      tags: [Audit]
      summary: Read the audit log (permission audit:read)
      parameters: [ { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        actor_id: { type: string }
                        actor_email: { type: string }
                        action: { type: string }
                        target: { type: string }
                        detail: { type: string }
                        created_at: { type: string, format: date-time }
        "403": { $ref: '#/components/responses/Forbidden' }

  /.well-known/openid-configuration:
    get:
      tags: [OIDC]
      summary: OpenID Connect discovery document
      security: []
      responses:
        "200": { description: OIDC provider metadata (issuer, endpoints, jwks_uri, supported flows) }
  /.well-known/jwks.json:
    get:
      tags: [OIDC]
      summary: JSON Web Key Set — public RS256 keys to verify tokens
      security: []
      responses:
        "200": { description: JWKS document }
  /authorize:
    get:
      tags: [OIDC]
      summary: Authorization endpoint (Authorization Code + PKCE); renders login/consent
      security: []
      parameters:
        - { name: response_type, in: query, required: true, schema: { type: string, enum: [code] } }
        - { name: client_id, in: query, required: true, schema: { type: string } }
        - { name: redirect_uri, in: query, required: true, schema: { type: string } }
        - { name: scope, in: query, schema: { type: string, example: "openid profile email" } }
        - { name: state, in: query, schema: { type: string } }
        - { name: code_challenge, in: query, schema: { type: string } }
        - { name: code_challenge_method, in: query, schema: { type: string, enum: [S256, plain] } }
        - { name: nonce, in: query, schema: { type: string } }
      responses:
        "200": { description: Login or consent HTML page }
        "302": { description: Redirect to redirect_uri with code (or error) }
  /token:
    post:
      tags: [OIDC]
      summary: Token endpoint — authorization_code & refresh_token grants
      security: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type: { type: string, enum: [authorization_code, refresh_token] }
                code: { type: string }
                redirect_uri: { type: string }
                client_id: { type: string }
                client_secret: { type: string }
                code_verifier: { type: string }
                refresh_token: { type: string }
      responses:
        "200": { description: "Tokens: access_token, id_token, refresh_token, token_type, expires_in" }
        "400": { description: invalid_grant / unsupported_grant_type }
  /userinfo:
    get:
      tags: [OIDC]
      summary: UserInfo — OIDC claims for the bearer access token
      responses:
        "200": { description: "Claims object (sub, email)" }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /oauth/clients:
    post:
      tags: [OIDC]
      summary: Register an OAuth client (admin, permission role:write)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                redirect_uris: { type: array, items: { type: string } }
                scopes: { type: array, items: { type: string } }
                confidential: { type: boolean }
      responses:
        "201": { description: "client_id and client_secret (secret returned once)" }
        "403": { $ref: '#/components/responses/Forbidden' }
security:
  - bearerAuth: []
